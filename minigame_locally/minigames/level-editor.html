<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feed the Bear — Level Editor</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #0f3460;
    --accent: #e94560;
    --accent2: #533483;
    --text: #eee;
    --text-dim: #999;
    --cell-size: 52px;
    --gap: 2px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'SF Pro Display', -apple-system, system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
  }

  h1 {
    font-size: 1.4rem;
    font-weight: 600;
    margin-bottom: 4px;
    letter-spacing: -0.02em;
  }

  .subtitle {
    color: var(--text-dim);
    font-size: 0.85rem;
    margin-bottom: 20px;
  }

  /* Controls bar */
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 20px;
  }

  .control-group {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    border-radius: 10px;
    padding: 8px 14px;
  }

  .control-group label {
    font-size: 0.8rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .size-input {
    width: 44px;
    background: var(--surface2);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    color: var(--text);
    font-size: 0.95rem;
    text-align: center;
    padding: 4px;
    font-weight: 600;
  }
  .size-input:focus { outline: 2px solid var(--accent); border-color: transparent; }
  .size-input.invalid { border-color: var(--accent); background: rgba(233,69,96,0.15); }

  .size-x { color: var(--text-dim); font-size: 0.85rem; }

  .limit-badge {
    font-size: 0.7rem;
    color: var(--accent);
    background: rgba(233,69,96,0.12);
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
  }

  /* Tool palette */
  .palette {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .tool-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border: 2px solid transparent;
    border-radius: 10px;
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.15s;
  }
  .tool-btn:hover { background: var(--surface2); }
  .tool-btn.active { border-color: var(--accent); background: rgba(233,69,96,0.15); }
  .tool-btn .icon { font-size: 1.2rem; }

  /* Pair color selector */
  .pair-colors {
    display: flex;
    gap: 4px;
    margin-left: 4px;
  }
  .pair-dot {
    width: 22px; height: 22px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.15s;
  }
  .pair-dot:hover { transform: scale(1.15); }
  .pair-dot.active { border-color: white; box-shadow: 0 0 8px rgba(255,255,255,0.3); }

  /* Grid */
  .grid-container {
    background: var(--surface);
    border-radius: 14px;
    padding: 16px;
    display: inline-block;
    margin-bottom: 20px;
  }

  .grid {
    display: grid;
    gap: var(--gap);
  }

  .cell {
    width: var(--cell-size);
    height: var(--cell-size);
    background: var(--surface2);
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    transition: background 0.1s;
    position: relative;
    user-select: none;
  }
  .cell:hover { filter: brightness(1.3); }

  .cell.empty { background: #1e2d4d; }
  .cell.blocker { background: #3a3a3a; }
  .cell.blocker::after {
    content: '✕';
    color: #777;
    font-size: 1.1rem;
    font-weight: 700;
  }
  .cell.pair {
    font-size: 1.5rem;
  }
  .cell.bear {
    background: linear-gradient(135deg, #8B4513, #A0522D);
  }
  .cell.bear::after {
    content: '🐻';
    font-size: 1.5rem;
  }

  /* Pair label inside cell */
  .cell .pair-label {
    position: absolute;
    bottom: 2px;
    right: 4px;
    font-size: 0.55rem;
    color: rgba(255,255,255,0.5);
    font-weight: 600;
  }

  /* Stats bar */
  .stats {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .stat {
    background: var(--surface);
    border-radius: 8px;
    padding: 6px 14px;
    text-align: center;
  }
  .stat .val { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
  .stat .lbl { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; }

  /* Actions */
  .actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 16px;
  }

  .btn {
    padding: 8px 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 600;
    transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { filter: brightness(1.15); }
  .btn-secondary { background: var(--surface2); color: var(--text); }
  .btn-secondary:hover { background: var(--surface); }
  .btn-danger { background: #5a1a1a; color: #ff6b6b; }
  .btn-danger:hover { background: #6a2a2a; }

  /* JSON output */
  .json-output {
    width: min(600px, 90vw);
    background: var(--surface);
    border-radius: 10px;
    padding: 14px;
    display: none;
  }
  .json-output.visible { display: block; }
  .json-output pre {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.8rem;
    color: #a8d8a8;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 300px;
    overflow-y: auto;
  }
  .json-output .json-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .json-output .json-title {
    font-size: 0.8rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 0.85rem;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .toast.error { background: var(--accent); }
</style>
</head>
<body>

<h1>Feed the Bear — Level Editor</h1>
<p class="subtitle">Click cells to paint with the selected tool</p>

<!-- Size controls -->
<div class="controls">
  <div class="control-group">
    <label>Cols</label>
    <input type="number" id="cols" class="size-input" min="3" max="8" value="6">
    <span class="size-x">×</span>
    <label>Rows</label>
    <input type="number" id="rows" class="size-input" min="3" max="7" value="6">
  </div>
  <span class="limit-badge">max 7 × 8 &nbsp;(56 celdas)</span>
</div>

<!-- Tool palette -->
<div class="palette">
  <button class="tool-btn active" data-tool="empty">
    <span class="icon">⬜</span> Empty
  </button>
  <button class="tool-btn" data-tool="blocker">
    <span class="icon">🧱</span> Blocker
  </button>
  <button class="tool-btn" data-tool="bear">
    <span class="icon">🐻</span> Bear
  </button>
  <button class="tool-btn" data-tool="pair">
    <span class="icon">🍎</span> Pair
    <div class="pair-colors" id="pairColors"></div>
  </button>
</div>

<!-- Stats -->
<div class="stats">
  <div class="stat"><div class="val" id="statBoard">6×6</div><div class="lbl">Board</div></div>
  <div class="stat"><div class="val" id="statPairs">0</div><div class="lbl">Pairs</div></div>
  <div class="stat"><div class="val" id="statBlockers">0</div><div class="lbl">Blockers</div></div>
  <div class="stat"><div class="val" id="statEmpty">36</div><div class="lbl">Empty</div></div>
</div>

<!-- Grid -->
<div class="grid-container">
  <div class="grid" id="grid"></div>
</div>

<!-- Actions -->
<div class="actions">
  <button class="btn btn-primary" onclick="exportJSON()">Export JSON</button>
  <button class="btn btn-secondary" onclick="importJSON()">Import JSON</button>
  <button class="btn btn-danger" onclick="clearGrid()">Clear All</button>
</div>

<!-- JSON output -->
<div class="json-output" id="jsonOutput">
  <div class="json-header">
    <span class="json-title">Level JSON</span>
    <button class="btn btn-secondary" onclick="copyJSON()" style="padding:4px 12px;font-size:0.75rem;">Copy</button>
  </div>
  <pre id="jsonPre"></pre>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Hidden file input -->
<input type="file" id="fileInput" accept=".json" style="display:none">

<script>
const PAIR_COLORS = [
  { name: 'Red',    hex: '#e74c3c', emoji: '🍎' },
  { name: 'Blue',   hex: '#3498db', emoji: '🫐' },
  { name: 'Green',  hex: '#2ecc71', emoji: '🥝' },
  { name: 'Yellow', hex: '#f1c40f', emoji: '🍋' },
  { name: 'Purple', hex: '#9b59b6', emoji: '🍇' },
  { name: 'Orange', hex: '#e67e22', emoji: '🍊' },
  { name: 'Pink',   hex: '#e84393', emoji: '🍓' },
  { name: 'Cyan',   hex: '#00cec9', emoji: '🧊' },
];

const MAX_ROWS = 7;
const MAX_COLS = 8;
const MIN_SIZE = 3;

let grid = [];  // grid[row][col] = { type: 'empty'|'blocker'|'bear'|'pair', pairIndex?: number }
let currentTool = 'empty';
let currentPairIndex = 0;
let rows = 6;
let cols = 6;
let isMouseDown = false;

// Init pair color dots
const pairColorsEl = document.getElementById('pairColors');
PAIR_COLORS.forEach((c, i) => {
  const dot = document.createElement('div');
  dot.className = 'pair-dot' + (i === 0 ? ' active' : '');
  dot.style.background = c.hex;
  dot.title = c.name;
  dot.onclick = (e) => {
    e.stopPropagation();
    currentPairIndex = i;
    document.querySelectorAll('.pair-dot').forEach(d => d.classList.remove('active'));
    dot.classList.add('active');
    // Also select pair tool
    selectTool('pair');
  };
  pairColorsEl.appendChild(dot);
});

// Tool selection
document.querySelectorAll('.tool-btn').forEach(btn => {
  btn.addEventListener('click', () => selectTool(btn.dataset.tool));
});

function selectTool(tool) {
  currentTool = tool;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-tool="${tool}"]`).classList.add('active');
}

// Size inputs
const rowsInput = document.getElementById('rows');
const colsInput = document.getElementById('cols');

function validateAndResize() {
  let r = parseInt(rowsInput.value) || MIN_SIZE;
  let c = parseInt(colsInput.value) || MIN_SIZE;

  r = Math.max(MIN_SIZE, Math.min(MAX_ROWS, r));
  c = Math.max(MIN_SIZE, Math.min(MAX_COLS, c));

  // Enforce combined constraint: area ≤ 56 (7*8)
  // and neither dimension exceeds its max
  // Also: if rows=8 then cols must be ≤7, if cols=8 then rows must be ≤7
  // Simplified: max is 7x8 or 8x7, meaning one dim ≤7 and other ≤8
  // But we already clamp rows to 7 and cols to 8, so just ensure total ≤ 56
  if (r * c > MAX_ROWS * MAX_COLS) {
    // reduce the dimension that was just changed
    if (document.activeElement === rowsInput) {
      r = Math.floor((MAX_ROWS * MAX_COLS) / c);
    } else {
      c = Math.floor((MAX_ROWS * MAX_COLS) / r);
    }
  }

  rowsInput.value = r;
  colsInput.value = c;

  // Visual feedback for limits
  rowsInput.classList.toggle('invalid', r >= MAX_ROWS);
  colsInput.classList.toggle('invalid', c >= MAX_COLS);

  if (r !== rows || c !== cols) {
    resizeGrid(r, c);
  }
}

rowsInput.addEventListener('input', validateAndResize);
colsInput.addEventListener('input', validateAndResize);

function resizeGrid(newRows, newCols) {
  const oldGrid = grid;
  rows = newRows;
  cols = newCols;
  grid = [];

  for (let r = 0; r < rows; r++) {
    grid[r] = [];
    for (let c = 0; c < cols; c++) {
      if (oldGrid[r] && oldGrid[r][c]) {
        grid[r][c] = { ...oldGrid[r][c] };
      } else {
        grid[r][c] = { type: 'empty' };
      }
    }
  }
  renderGrid();
  updateStats();
}

function initGrid() {
  grid = [];
  for (let r = 0; r < rows; r++) {
    grid[r] = [];
    for (let c = 0; c < cols; c++) {
      grid[r][c] = { type: 'empty' };
    }
  }
  renderGrid();
  updateStats();
}

function renderGrid() {
  const gridEl = document.getElementById('grid');
  gridEl.innerHTML = '';
  gridEl.style.gridTemplateColumns = `repeat(${cols}, var(--cell-size))`;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.row = r;
      cell.dataset.col = c;

      applyCellVisual(cell, grid[r][c]);

      cell.addEventListener('mousedown', (e) => {
        e.preventDefault();
        isMouseDown = true;
        paintCell(r, c);
      });
      cell.addEventListener('mouseenter', () => {
        if (isMouseDown) paintCell(r, c);
      });
      cell.addEventListener('touchstart', (e) => {
        e.preventDefault();
        paintCell(r, c);
      });

      gridEl.appendChild(cell);
    }
  }
}

function applyCellVisual(cell, data) {
  cell.className = 'cell ' + data.type;

  // clear inner
  cell.innerHTML = '';

  if (data.type === 'pair') {
    const pc = PAIR_COLORS[data.pairIndex] || PAIR_COLORS[0];
    cell.style.background = pc.hex + '33';
    cell.style.border = `2px solid ${pc.hex}`;
    cell.textContent = pc.emoji;

    const lbl = document.createElement('span');
    lbl.className = 'pair-label';
    lbl.textContent = pc.name[0];
    cell.appendChild(lbl);
  } else {
    cell.style.background = '';
    cell.style.border = '';
  }
}

function paintCell(r, c) {
  const data = grid[r][c];

  if (currentTool === 'bear') {
    // Only one bear allowed — remove old one
    if (data.type === 'bear') {
      grid[r][c] = { type: 'empty' };
    } else {
      for (let rr = 0; rr < rows; rr++)
        for (let cc = 0; cc < cols; cc++)
          if (grid[rr][cc].type === 'bear') grid[rr][cc] = { type: 'empty' };
      grid[r][c] = { type: 'bear' };
    }
  } else if (currentTool === 'pair') {
    // Max 2 of same pair index
    if (data.type === 'pair' && data.pairIndex === currentPairIndex) {
      grid[r][c] = { type: 'empty' };
    } else {
      const count = countPairCells(currentPairIndex);
      const isReplacing = data.type === 'pair' && data.pairIndex === currentPairIndex;
      if (count >= 2 && !isReplacing) {
        showToast(`Pair "${PAIR_COLORS[currentPairIndex].name}" already has 2 cells — remove one first`, true);
        return;
      }
      grid[r][c] = { type: 'pair', pairIndex: currentPairIndex };
    }
  } else if (currentTool === 'blocker') {
    grid[r][c] = data.type === 'blocker' ? { type: 'empty' } : { type: 'blocker' };
  } else {
    grid[r][c] = { type: 'empty' };
  }

  renderGrid();
  updateStats();
}

function countPairCells(idx) {
  let n = 0;
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      if (grid[r][c].type === 'pair' && grid[r][c].pairIndex === idx) n++;
  return n;
}

document.addEventListener('mouseup', () => { isMouseDown = false; });

function updateStats() {
  let pairs = new Set();
  let blockers = 0;
  let empty = 0;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const d = grid[r][c];
      if (d.type === 'pair') pairs.add(d.pairIndex);
      else if (d.type === 'blocker') blockers++;
      else if (d.type === 'empty') empty++;
    }
  }

  document.getElementById('statBoard').textContent = `${cols}×${rows}`;
  document.getElementById('statPairs').textContent = pairs.size;
  document.getElementById('statBlockers').textContent = blockers;
  document.getElementById('statEmpty').textContent = empty;
}

function clearGrid() {
  if (!confirm('Clear the entire grid?')) return;
  initGrid();
  showToast('Grid cleared');
}

function exportJSON() {
  const level = buildLevelJSON();
  const json = JSON.stringify(level, null, 2);
  document.getElementById('jsonPre').textContent = json;
  document.getElementById('jsonOutput').classList.add('visible');
}

function buildLevelJSON() {
  const boardData = [];
  const pairsMap = {};  // pairIndex → [{r,c}, ...]
  let bearPos = null;
  let blockerList = [];

  for (let r = 0; r < rows; r++) {
    const row = [];
    for (let c = 0; c < cols; c++) {
      const d = grid[r][c];
      if (d.type === 'blocker') {
        row.push('X');
        blockerList.push({ row: r, col: c });
      } else if (d.type === 'bear') {
        row.push('B');
        bearPos = { row: r, col: c };
      } else if (d.type === 'pair') {
        const label = PAIR_COLORS[d.pairIndex].name[0];
        row.push(label);
        if (!pairsMap[d.pairIndex]) pairsMap[d.pairIndex] = [];
        pairsMap[d.pairIndex].push({ row: r, col: c });
      } else {
        row.push('.');
      }
      boardData.push();
    }
  }

  // Build pairs array
  const pairsArr = Object.keys(pairsMap).map(idx => {
    const pc = PAIR_COLORS[idx];
    const cells = pairsMap[idx];
    return {
      color: pc.name.toLowerCase(),
      emoji: pc.emoji,
      cells: cells
    };
  });

  // Build grid as array of strings
  const gridStrings = [];
  for (let r = 0; r < rows; r++) {
    let s = '';
    for (let c = 0; c < cols; c++) {
      const d = grid[r][c];
      if (d.type === 'blocker') s += 'X';
      else if (d.type === 'bear') s += 'B';
      else if (d.type === 'pair') s += PAIR_COLORS[d.pairIndex].name[0];
      else s += '.';
    }
    gridStrings.push(s);
  }

  return {
    board: { rows, cols },
    grid: gridStrings,
    bear: bearPos,
    pairs: pairsArr,
    blockers: blockerList,
    stats: {
      pairs: pairsArr.length,
      blockers: blockerList.length,
      totalCells: rows * cols
    }
  };
}

function copyJSON() {
  const text = document.getElementById('jsonPre').textContent;
  navigator.clipboard.writeText(text).then(() => showToast('Copied!')).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Copied!');
  });
}

function importJSON() {
  const input = document.getElementById('fileInput');
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        loadFromJSON(data);
        showToast('Level loaded!');
      } catch (err) {
        showToast('Invalid JSON file', true);
      }
    };
    reader.readAsText(file);
    input.value = '';
  };
  input.click();
}

function loadFromJSON(data) {
  if (data.board) {
    const r = Math.min(MAX_ROWS, Math.max(MIN_SIZE, data.board.rows || 6));
    const c = Math.min(MAX_COLS, Math.max(MIN_SIZE, data.board.cols || 6));
    rows = r;
    cols = c;
    rowsInput.value = r;
    colsInput.value = c;
  }

  initGrid();

  // Load from grid strings
  if (data.grid && Array.isArray(data.grid)) {
    // Build a map from first-letter to pair index
    const letterToIdx = {};
    if (data.pairs) {
      data.pairs.forEach((p, i) => {
        const colorName = p.color || '';
        const matchIdx = PAIR_COLORS.findIndex(pc => pc.name.toLowerCase() === colorName);
        if (matchIdx >= 0) letterToIdx[PAIR_COLORS[matchIdx].name[0]] = matchIdx;
      });
    }

    for (let r = 0; r < rows && r < data.grid.length; r++) {
      const line = data.grid[r];
      for (let c = 0; c < cols && c < line.length; c++) {
        const ch = line[c];
        if (ch === 'X') {
          grid[r][c] = { type: 'blocker' };
        } else if (ch === 'B') {
          grid[r][c] = { type: 'bear' };
        } else if (ch !== '.') {
          // Try to match pair letter
          const idx = letterToIdx[ch];
          if (idx !== undefined) {
            grid[r][c] = { type: 'pair', pairIndex: idx };
          }
        }
      }
    }
  }

  renderGrid();
  updateStats();
}

function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => { t.className = 'toast'; }, 2000);
}

// Init
initGrid();
</script>
</body>
</html>
